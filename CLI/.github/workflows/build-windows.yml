name: Build Windows CLI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Compile CLI
        run: bun run compile
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apex-cli-windows
          path: dist/cli.exe
