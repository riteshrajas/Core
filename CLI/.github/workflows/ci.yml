name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .[dev]
          pip install pre-commit pytest black isort flake8
      - name: Run pre-commit checks
        run: pre-commit run --all-files
      - name: Run tests
        run: pytest
