<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Apex Core</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <div class="badge">MCP local</div>
        <h1>Apex Core</h1>
        <p class="lead">Switchable multi-agent console with provider routing and memory.</p>
        <div class="status" id="status">Connecting...</div>
      </header>

      <main class="layout">
        <section class="panel controls">
          <h2>Control deck</h2>
          <label class="field">
            <span>Provider</span>
            <select id="providerInput">
              <option value="auto">auto</option>
            </select>
          </label>
          <label class="field">
            <span>Agent</span>
            <select id="agentInput">
              <option value="auto">auto</option>
            </select>
          </label>
          <label class="field">
            <span>Model</span>
            <input id="modelInput" type="text" placeholder="qwen3:4b" autocomplete="off" />
          </label>
          <label class="field">
            <span>Thread ID</span>
            <input id="threadIdInput" type="text" placeholder="Auto-generated if empty" autocomplete="off" />
          </label>
          <label class="field">
            <span>System prompt</span>
            <textarea id="systemInput" rows="4" placeholder="Optional system prompt"></textarea>
          </label>
          <div class="field">
            <div class="field-row">
              <span>Temperature</span>
              <span class="field-value" id="temperatureValue">0.20</span>
            </div>
            <input id="temperatureInput" type="range" min="0" max="1" step="0.05" value="0.2" />
          </div>
          <label class="field inline">
            <input id="historyToggle" type="checkbox" checked />
            <span>Include history</span>
          </label>
          <label class="field">
            <span>History depth</span>
            <input id="historyDepth" type="number" min="0" max="12" value="8" />
          </label>
          <button class="ghost" id="clearChat" type="button">Clear chat</button>
          <p class="muted">
            Tip: Try /search for researcher mode, or /read and /write for system mode tools.
          </p>
        </section>

        <section class="panel chat">
          <div class="chat-header">
            <div>
              <h2>Chat stream</h2>
              <p class="muted">Talk to Apex supervisor and let it route the best agent.</p>
            </div>
            <div class="pill" id="sessionPill">offline</div>
          </div>
          <ul id="messages" class="messages"></ul>
          <form id="chatForm" class="composer">
            <textarea id="messageInput" rows="3" placeholder="Ask Apex..."></textarea>
            <div class="composer-actions">
              <button id="sendButton" type="submit">Send</button>
            </div>
          </form>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
